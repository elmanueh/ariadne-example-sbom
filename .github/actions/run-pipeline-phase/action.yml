name: Run Pipeline Phase
description: Run one ontology-validator phase from the configured pipeline image.

inputs:
  phase:
    description: Pipeline phase name.
    required: true
  config:
    description: Pipeline config path.
    required: false
    default: pipeline-config.yml
  artifacts-path:
    description: Directory used by the pipeline to exchange artifacts.
    required: false
    default: dist/artifacts
  restore-artifacts:
    description: Download artifacts produced by previous phase jobs.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Validate pipeline settings
      shell: bash
      run: |
        if [ -z "${PIPELINE_IMAGE}" ]; then
          echo "::error::Set env PIPELINE_IMAGE."
          exit 1
        fi
        if [ -z "${GHCR_USER}" ]; then
          echo "::error::Set env GHCR_USER."
          exit 1
        fi
        if [ -z "${GHCR_TOKEN}" ]; then
          echo "::error::Set env GHCR_TOKEN."
          exit 1
        fi

    - name: Login to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ env.GHCR_USER }}
        password: ${{ env.GHCR_TOKEN }}

    - name: Download upstream phase artifacts
      if: ${{ inputs.restore-artifacts == 'true' }}
      uses: actions/download-artifact@v6
      with:
        pattern: phase-artifacts-*
        path: ${{ runner.temp }}/phase-artifacts
        merge-multiple: false

    - name: Prepare artifact directory
      shell: bash
      run: mkdir -p "${{ inputs.artifacts-path }}"

    - name: Restore upstream artifact state
      if: ${{ inputs.restore-artifacts == 'true' }}
      shell: bash
      run: |
        python3 <<'PY'
        import json
        import shutil
        from pathlib import Path

        artifacts_path = Path("${{ inputs.artifacts-path }}")
        download_path = Path("${{ runner.temp }}") / "phase-artifacts"
        artifacts_path.mkdir(parents=True, exist_ok=True)

        merged: list[dict] = []
        seen: set[tuple[str, str, str]] = set()

        for artifact_file in sorted(download_path.glob("*/artifacts.json")):
            try:
                payload = json.loads(artifact_file.read_text(encoding="utf-8"))
            except (OSError, json.JSONDecodeError):
                continue

            raw_artifacts = payload.get("artifacts", []) if isinstance(payload, dict) else []
            if not isinstance(raw_artifacts, list):
                continue

            for raw_artifact in raw_artifacts:
                if not isinstance(raw_artifact, dict):
                    continue
                key = (
                    str(raw_artifact.get("artifact_type", "")),
                    str(raw_artifact.get("name", "")),
                    str(raw_artifact.get("path", "")),
                )
                if key in seen:
                    continue
                seen.add(key)
                merged.append(raw_artifact)

        for source in sorted(download_path.glob("*")):
            if not source.is_dir():
                continue
            for item in source.iterdir():
                if item.name == "artifacts.json":
                    continue
                target = artifacts_path / item.name
                if item.is_dir():
                    shutil.copytree(item, target, dirs_exist_ok=True)
                elif item.is_file():
                    target.parent.mkdir(parents=True, exist_ok=True)
                    shutil.copy2(item, target)

        if merged:
            (artifacts_path / "artifacts.json").write_text(
                json.dumps({"artifacts": merged}, indent=2, ensure_ascii=False),
                encoding="utf-8",
            )
        PY

    - name: Pull image
      shell: bash
      run: docker pull "${PIPELINE_IMAGE}"

    - name: Run phase
      shell: bash
      run: |
        docker run --rm \
          --network host \
          -e QASAR_KEY="${QASAR_KEY}" \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          -w /workspace \
          "${PIPELINE_IMAGE}" \
          run-phase "${{ inputs.phase }}" \
            --workspace /workspace \
            --config "${{ inputs.config }}"

    - name: Upload phase artifacts
      if: ${{ always() }}
      uses: actions/upload-artifact@v6
      with:
        name: phase-artifacts-${{ inputs.phase }}
        path: |
          ${{ inputs.artifacts-path }}
          !${{ inputs.artifacts-path }}/pipeline-context.json
        if-no-files-found: warn
