name: Pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pipeline:
    name: Main pipeline
    runs-on: ubuntu-latest

    services:
      rdf4j:
        image: eclipse/rdf4j-workbench:5.3.0-tomcat
        ports:
          - 8080:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull image
        shell: bash
        run: |
          docker pull "${{ vars.PIPELINE_IMAGE }}"

      - name: Run complete pipeline
        shell: bash
        run: |
          docker run --rm \
            --network host \
            -e QASAR_KEY="${{ secrets.QASAR_KEY }}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${{ vars.PIPELINE_IMAGE }}" \
            run \
              --workspace /workspace \
              --config pipeline-config.yml

      - name: Upload pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pipeline-artifacts
          path: dist/artifacts
          if-no-files-found: warn
